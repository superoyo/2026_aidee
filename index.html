<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey! AiDee</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.app{display:flex;width:100vw;min-height:100vh}
.left-panel{width:42%;background:#e8e4de;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.robot-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.robot-svg{width:280px;height:320px}
.robot-name{font-size:28px;font-weight:700;color:#333;letter-spacing:2px}
.right-panel{width:58%;background:#fff;display:flex;flex-direction:column;padding:48px 52px;min-height:100vh}
.tagline{font-size:18px;font-weight:400;color:#333;margin-bottom:6px;line-height:1.4}
.tagline strong{font-size:clamp(28px,3.5vw,42px);font-weight:800;display:block;color:#111;letter-spacing:-1px;white-space:nowrap}
.tabs{display:flex;gap:12px;margin:28px 0 0}
.tab-btn{flex:1;padding:18px 12px;border-radius:16px;border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:17px;font-weight:700;line-height:1.35;transition:all .2s;color:#fff;background:#666}
.tab-btn:hover{background:#444}
.tab-btn.active{background:#111}
.sub-options{display:flex;gap:20px;margin:20px 0 0;flex-wrap:wrap;min-height:36px}
.sub-opt{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:15px;font-weight:600;color:#333;padding:8px 16px;border-radius:100px;border:1.5px solid #ccc;transition:all .2s;background:#fff}
.sub-opt:hover{border-color:#999}
.sub-opt.active{background:#111;color:#fff;border-color:#111}
.sub-opt input[type=radio]{display:none}
.content-area{flex:1;margin:20px 0;overflow-y:auto;max-height:calc(100vh - 380px)}
.chat-box{margin-top:auto;border:1.5px solid #ddd;border-radius:16px;padding:16px 20px;background:#fafafa}
.chat-input{width:100%;border:none;background:transparent;font-family:'Sarabun',sans-serif;font-size:16px;color:#333;outline:none;resize:none;min-height:48px;max-height:120px}
.chat-input::placeholder{color:#aaa}
.chat-tools{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.chat-tools-left{display:flex;gap:12px}
.tool-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:6px 14px;font-size:13px;color:#666;cursor:pointer;font-family:'Sarabun',sans-serif;display:flex;align-items:center;gap:6px;transition:background .15s}
.tool-btn:hover{background:#f0f0f0}
.send-btn{background:#111;color:#fff;border:none;border-radius:10px;width:40px;height:40px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.send-btn:hover{background:#333}
.send-btn:disabled{background:#ccc;cursor:not-allowed}

.api-bar{background:#fff8e7;border:1px solid #f0d060;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.api-bar label{font-size:13px;font-weight:600;color:#886600;white-space:nowrap}
.api-bar input{flex:1;min-width:200px;border:1px solid #ddd;border-radius:8px;padding:6px 12px;font-size:13px;font-family:'Sarabun',sans-serif;outline:none}
.api-save-btn{background:#111;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif}

.results{display:flex;flex-direction:column;gap:12px}
.award-card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:16px 20px;transition:box-shadow .2s}
.award-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.award-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.award-card-brand{font-size:16px;font-weight:700;color:#111}
.award-card-camp{font-size:14px;color:#555;margin-top:2px}
.award-badge{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{padding:3px 10px;border-radius:100px;font-size:12px;font-weight:700;white-space:nowrap}
.badge-gp{background:#111;color:#fff}
.badge-gold{background:#b8860b;color:#fff}
.badge-silver{background:#888;color:#fff}
.badge-bronze{background:#8b4513;color:#fff}
.badge-finalist{background:#e8e8e8;color:#666}
.badge-adman{background:#1a3a6b;color:#fff}
.badge-adfest{background:#7b2d8b;color:#fff}
.award-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#888}
.award-meta span{display:flex;align-items:center;gap:4px}
.award-body{margin-top:10px;font-size:14px;color:#555;line-height:1.5}
.insight-tag{font-size:12px;background:#f0f0f0;border-radius:8px;padding:4px 10px;display:inline-block;margin-top:6px}
.caseboard-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:7px 16px;background:#111;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;text-decoration:none;transition:background .15s}
.caseboard-btn:hover{background:#333}
.caseboard-btn svg{flex-shrink:0}
.award-sub{font-size:12px;color:#888;margin-top:3px}
.award-code{font-size:11px;color:#bbb;margin-top:2px;font-family:monospace}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-select{border:1px solid #ddd;border-radius:8px;padding:6px 12px;font-size:13px;font-family:'Sarabun',sans-serif;background:#fff;color:#333;cursor:pointer;outline:none}
.filter-select:focus{border-color:#999}

.ai-result{background:#f8f8ff;border:1px solid #ddd;border-radius:14px;padding:20px;margin-top:12px}
.ai-result-head{font-size:15px;font-weight:700;color:#111;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ai-result p{font-size:14px;line-height:1.7;color:#333;margin-bottom:8px}
.ai-result ul{padding-left:20px;font-size:14px;line-height:1.8;color:#333}
.ai-result h4{font-size:14px;font-weight:700;color:#111;margin:12px 0 6px}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.score-item{background:#fff;border:1px solid #eee;border-radius:10px;padding:12px}
.score-label{font-size:12px;color:#888;margin-bottom:4px}
.score-val{font-size:22px;font-weight:800;color:#111}
.score-bar{height:4px;background:#eee;border-radius:2px;margin-top:6px;overflow:hidden}
.score-fill{height:100%;background:#111;border-radius:2px;transition:width 1s}
.cat-pill{display:inline-block;background:#111;color:#fff;border-radius:100px;padding:6px 16px;font-size:13px;font-weight:700;margin:4px 4px 4px 0}
.loader{display:flex;align-items:center;gap:10px;color:#888;font-size:14px;padding:20px 0}
.dot{width:8px;height:8px;background:#ccc;border-radius:50%;animation:pulse 1.4s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.empty-state{text-align:center;padding:48px 24px;color:#aaa}
.empty-state svg{margin-bottom:16px;opacity:.3}
.empty-state p{font-size:15px}
.user-bubble{background:#111;color:#fff;border-radius:16px 16px 4px 16px;padding:12px 16px;font-size:14px;line-height:1.6;margin-bottom:12px;max-width:85%;align-self:flex-end;margin-left:auto}
.messages{display:flex;flex-direction:column;gap:8px}
.info-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:7px 16px;background:#f5f5f0;color:#555;border:1.5px solid #ddd;border-radius:10px;font-size:13px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;text-decoration:none;transition:all .15s}
.info-btn:hover{background:#eee;border-color:#bbb}
.info-btn.loading{opacity:.6;cursor:not-allowed}
.translate-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;background:#fff;color:#555;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;transition:all .15s}
.translate-btn:hover{background:#f5f5f5;border-color:#999}
.translate-btn:disabled{opacity:.5;cursor:not-allowed}
.info-panel{display:none;margin-top:14px;border-top:1px solid #eee;padding-top:14px}
.info-section{margin-bottom:12px}
.info-label{font-size:11px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.info-text{font-size:13px;color:#333;line-height:1.65}
</style>
</head>
<body>
<div class="app">
  <div class="left-panel">
    <div class="robot-wrap">
      <img src="/aidee_mascot.png" style="width:720px;max-width:95%;object-fit:contain;filter:drop-shadow(0 8px 32px rgba(0,0,0,.12))" alt="AiDee">
    </div>
  </div>

  <div class="right-panel">
    <div class="api-bar" id="apiBar" style="display:none">
      <label>Claude API Key:</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
      <button class="api-save-btn" onclick="saveApiKey()">บันทึก</button>
    </div>

    <div class="tagline">อยากรู้อะไร ถาม<strong>AiDee มาได้เลย</strong></div>

    <div class="tabs">
      <button class="tab-btn" onclick="setTab('check')">เช็คไอเดียซ้ำ/<br>ใกล้เคียง?</button>
      <button class="tab-btn" onclick="setTab('awards')">งานรางวัล<br>ที่ผ่านมา?</button>
      <button class="tab-btn" onclick="setTab('analyze')">วิเคราะห์<br>ไอเดีย</button>
    </div>

    <div class="sub-options" id="subOptions"></div>
    <div class="content-area" id="contentArea">
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="#ccc" stroke-width="3"/><path d="M22 26c0-5.5 4.5-10 10-10s10 4.5 10 10c0 6-10 16-10 16S22 32 22 26z" stroke="#ccc" stroke-width="3"/><circle cx="32" cy="26" r="3" fill="#ccc"/></svg>
        <p>เลือก mode และพิมพ์คำถามด้านล่างได้เลย</p>
      </div>
    </div>

    <div class="chat-box">
      <textarea class="chat-input" id="chatInput" placeholder="Ask anything..." rows="2" onkeydown="handleKey(event)"></textarea>
      <div class="chat-tools">
        <div class="chat-tools-left">
          <button class="tool-btn" onclick="document.getElementById('chatInput').focus()">+ เพิ่ม</button>
          <button class="tool-btn">⚙ Tools</button>
        </div>
        <button class="send-btn" id="sendBtn" onclick="handleSend()">&#9654;</button>
      </div>
    </div>
  </div>
</div>

<script>
let AWARDS = [];

let currentTab = '';
let currentSub = '';
let apiKey = localStorage.getItem('aidee_api_key') || '';

async function init() {
  if (apiKey) {
    document.getElementById('apiKeyInput').value = apiKey;
    document.getElementById('apiBar').style.display = 'none';
  }
  // Show loading state
  document.getElementById('contentArea').innerHTML = `
    <div class="loader" style="justify-content:center;padding:40px">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <span>กำลังโหลดข้อมูล ADMAN + ADFEST...</span>
    </div>`;
  try {
    const res = await fetch('/awards.json');
    AWARDS = await res.json();
    console.log('Loaded', AWARDS.length, 'entries');
  } catch(e) {
    console.warn('Could not load awards.json, using empty dataset');
  }
  setTab('awards');
}

function saveApiKey() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('aidee_api_key', apiKey);
  document.getElementById('apiBar').style.display = 'none';
}

function setTab(tab) {
  currentTab = tab;
  currentSub = '';
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['check','awards','analyze'][i] === tab);
  });
  const subs = {
    check: ['By Keyword','Insight / Background','Idea / Execution'],
    awards: ['Brand','Category','Award Type','Year'],
    analyze: ['AiDee Score','Category Recommend','Case Analyze']
  };
  const subEl = document.getElementById('subOptions');
  subEl.innerHTML = subs[tab].map((s,i) => `
    <label class="sub-opt" onclick="setSub('${s}')">
      <input type="radio" name="sub" value="${s}"> ${s}
    </label>`).join('');

  if (tab === 'awards') {
    setSub('Category');
  } else {
    document.getElementById('contentArea').innerHTML = `<div class="empty-state"><svg width="64" height="64" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="#ccc" stroke-width="3"/><path d="M22 26c0-5.5 4.5-10 10-10s10 4.5 10 10c0 6-10 16-10 16S22 32 22 26z" stroke="#ccc" stroke-width="3"/><circle cx="32" cy="26" r="3" fill="#ccc"/></svg><p>เลือก sub-option และพิมพ์คำถาม หรือเลือก filter ด้านบน</p></div>`;
  }
}

function setSub(sub) {
  currentSub = sub;
  document.querySelectorAll('.sub-opt').forEach(el => {
    el.classList.toggle('active', el.querySelector('input').value === sub);
  });
  if (currentTab === 'awards') showAwardsUI();
  if (currentTab === 'check' && sub === 'By Keyword') showKeywordSearchUI();
}

function showKeywordSearchUI() {
  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <div style="margin-bottom:20px">
      <div style="font-size:14px;color:#888;margin-bottom:12px">กรอก keyword ที่เกี่ยวข้องกับไอเดีย เช่น <em>แม่, รถไฟ, ผงซักฟอก, สุนัข, ความเหงา</em></div>
      <div style="display:flex;gap:8px">
        <input id="kwInput" type="text" placeholder="พิมพ์ keyword ภาษาไทยหรืออังกฤษ..."
          style="flex:1;border:1.5px solid #ddd;border-radius:10px;padding:10px 16px;font-size:15px;font-family:'Sarabun',sans-serif;outline:none"
          onkeydown="if(event.key==='Enter')searchByKeyword()"
          onfocus="this.style.borderColor='#999'" onblur="this.style.borderColor='#ddd'">
        <button onclick="searchByKeyword()"
          style="background:#111;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:15px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer">
          ค้นหา
        </button>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap" id="kwChips"></div>
    </div>
    <div id="kwResults"></div>`;

  // Suggest popular themes
  const suggestions = ['แม่','รถไฟ','เด็ก','ความเหงา','สิ่งแวดล้อม','สุขภาพ','เทคโนโลยี','ความรัก','อาหาร','สุนัข','ผู้สูงอายุ','น้ำ'];
  document.getElementById('kwChips').innerHTML = suggestions.map(s =>
    `<span onclick="document.getElementById('kwInput').value='${s}';searchByKeyword()"
      style="cursor:pointer;background:#f0f0f0;border-radius:100px;padding:4px 14px;font-size:13px;color:#555;transition:background .15s"
      onmouseover="this.style.background='#e0e0e0'" onmouseout="this.style.background='#f0f0f0'">${s}</span>`
  ).join('');

  setTimeout(() => document.getElementById('kwInput').focus(), 100);
}

async function searchByKeyword() {
  const kw = document.getElementById('kwInput').value.trim();
  if (!kw) return;
  const resultsEl = document.getElementById('kwResults');
  resultsEl.innerHTML = `<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>กำลังค้นหา "${kw}"...</span></div>`;

  // Step 1: local search across all text fields
  const kwLower = kw.toLowerCase();
  const fields = ['campaign','brand','agency','category','subcategory','campaign_summary','creativity_idea_insight','strategy','execution','result'];
  let matched = AWARDS.filter(a =>
    fields.some(f => (a[f]||'').toLowerCase().includes(kwLower))
  );

  // Step 2: if keyword is Thai or few matches, use Claude API for semantic/translated search
  const isThai = /[฀-๿]/.test(kw);
  if (isThai || matched.length < 5) {
    try {
      // Ask Claude to find related English terms and top matching campaigns
      const sample = AWARDS.map(a => ({
        id: AWARDS.indexOf(a),
        comp: a.comp, year: a.year,
        campaign: a.campaign, brand: a.brand,
        category: a.category, level: a.level,
        summary: (a.campaign_summary || '').slice(0, 120)
      }));
      // Send in batches of 500 for speed
      const batch = sample.slice(0, 800);
      const res = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 600,
          messages: [{
            role: 'user',
            content: `จาก keyword "${kw}" ให้หา index ของ campaign ในรายการนี้ที่มี theme/ไอเดีย/insight ที่เกี่ยวข้องกับ keyword นี้มากที่สุด (สูงสุด 20 รายการ)

รายการ campaign:
${JSON.stringify(batch)}

ตอบเป็น JSON เท่านั้น รูปแบบ: {"indices":[0,5,12,...],"reason":"..."}`
          }]
        })
      });
      const data = await res.json();
      const text = data.content[0].text;
      const m = text.match(/\{[\s\S]*\}/);
      if (m) {
        const parsed = JSON.parse(m[0]);
        const aiMatched = (parsed.indices || []).map(i => AWARDS[i]).filter(Boolean);
        // Merge with local matches, dedupe
        const seen = new Set(matched.map(a => a.campaign + a.year));
        aiMatched.forEach(a => {
          if (!seen.has(a.campaign + a.year)) { matched.push(a); seen.add(a.campaign + a.year); }
        });
      }
    } catch(e) {}
  }

  if (!matched.length) {
    resultsEl.innerHTML = `<div class="empty-state"><p>ไม่พบผลงานที่เกี่ยวข้องกับ "${kw}"<br>ลองเปลี่ยน keyword หรือใช้ภาษาอังกฤษดูนะคะ</p></div>`;
    return;
  }

  // Render results as award cards
  window._filteredAwards = matched;
  resultsEl.innerHTML = `<div style="font-size:13px;color:#888;margin-bottom:12px">พบ <strong style="color:#111">${matched.length}</strong> ผลงานที่เกี่ยวข้องกับ "${kw}"</div>` +
    matched.map((a, idx) => {
      const pdfUrl = CATEGORY_PDFS[a.category] || '';
      const levelClass = {'Grand Prix':'gp','Gold':'gold','Silver':'silver','Bronze':'bronze','Finalist':'finalist','Lotus Roots':'gp','Grande (Grand Prix)':'gp','Grande':'gp'}[a.level] || 'finalist';
      return `
      <div class="award-card">
        <div class="award-card-top">
          <div style="flex:1;min-width:0">
            ${a.image_url ? `<img src="${a.image_url}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:10px" loading="lazy" onerror="this.style.display='none'">` : ''}
            <div class="award-card-brand">${a.brand || a.campaign}</div>
            <div class="award-card-camp">${a.brand ? a.campaign : ''} <span style="color:#aaa">${a.agency ? '— ' + a.agency : ''}</span></div>
            ${a.subcategory ? `<div class="award-sub">📂 ${a.subcategory}</div>` : ''}
            ${a.code ? `<div class="award-code">${a.code}</div>` : ''}
          </div>
          <div class="award-badge" style="flex-shrink:0">
            <span class="badge badge-${(a.comp||'').toLowerCase()}">${a.comp}</span>
            <span class="badge badge-${levelClass}">${a.level}</span>
          </div>
        </div>
        <div class="award-meta"><span>📅 ${a.year}</span><span>🏷️ ${a.category}</span></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:8px">
          <div></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${a.video_url ? `<a class="caseboard-btn" href="${a.video_url}" target="_blank" rel="noopener" style="background:#c00"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>Caseboard Video</a>` : ''}
            ${pdfUrl ? `<a class="caseboard-btn" href="${pdfUrl}" target="_blank" rel="noopener"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Caseboard PDF</a>` : ''}
            <button class="caseboard-btn" onclick="openCaseboardPDF(${idx})" style="background:#444;border:none;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Caseboard</button>
            <button class="info-btn" onclick="toggleInfo(this, ${idx})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>INFO</button>
          </div>
        </div>
        <div class="info-panel"></div>
      </div>`;
    }).join('');
}

function showAwardsUI() {
  const area = document.getElementById('contentArea');
  const cats = [...new Set(AWARDS.map(a=>a.category))].sort();

function filterAwards() {

    (!comp || a.comp === comp) &&
    (!level || a.level === level) &&
    (!year || a.year == year) &&
    (!cat || a.category === cat)

  const el = document.getElementById('awardResults');

async function toggleInfo(btn, idx) {
  const award = window._filteredAwards[idx];
  // Use pre-fetched real data if available
  const preInfo = award.campaign_summary ? {
    campaign_summary: award.campaign_summary,
    creativity_idea_insight: award.creativity_idea_insight,
    strategy: award.strategy,
    execution: award.execution,
    result: award.result
  } : null;
  const panel = btn.closest('.award-card').querySelector('.info-panel');
  const infoSVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;

  if (panel.style.display === 'block') {
    panel.style.display = 'none';
    btn.innerHTML = `${infoSVG} INFO`;
    return;
  }
  if (panel.dataset.loaded === '1') {
    panel.style.display = 'block';
    btn.innerHTML = `${infoSVG} ซ่อน`;
    return;
  }

  // If pre-fetched real data is available, use it directly
  if (preInfo && preInfo.campaign_summary) {
    renderInfoPanel(panel, preInfo, 'real');
    panel.style.display = 'block';
    panel.dataset.loaded = '1';
    btn.innerHTML = `${infoSVG} ซ่อน`;
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;
  panel.style.display = 'block';
  panel.innerHTML = `<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>AiDee กำลังวิเคราะห์...</span></div>`;

  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 900,
        messages: [{
          role: 'user',
          content: `You are an advertising expert. Provide structured campaign info for this award-winning ad. Write in English. Be concise (2-4 sentences per section).

Campaign: "${award.campaign}"
Brand: ${award.brand}
Agency: ${award.agency}
Category: ${award.category}
Award: ${award.level} — ${award.comp} ${award.year}
${award.subcategory ? 'Subcategory: ' + award.subcategory : ''}

Return ONLY valid JSON, no markdown, no code block:
{"campaign_summary":"...","creativity_idea_insight":"...","strategy":"...","execution":"...","result":"..."}`
        }]
      })
    });
    const data = await res.json();
    const text = data.content[0].text.trim();
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON');
    const info = JSON.parse(match[0]);
    renderInfoPanel(panel, info, 'ai');
    panel.dataset.loaded = '1';
    btn.innerHTML = `${infoSVG} ซ่อน`;
  } catch(e) {
    panel.innerHTML = `<p style="font-size:13px;color:#c00">เกิดข้อผิดพลาด กรุณาลองใหม่</p>`;
  }
  btn.classList.remove('loading');
  btn.disabled = false;
}

function renderInfoPanel(panel, info, source) {
  const KEYS = [
    { key: 'campaign_summary',        label: 'Campaign Summary' },
    { key: 'creativity_idea_insight', label: 'Creativity / Idea / Insight' },
    { key: 'strategy',                label: 'Strategy' },
    { key: 'execution',               label: 'Execution' },
    { key: 'result',                  label: 'Result' },
  ];
  const badge = source === 'real'
    ? `<span style="font-size:10px;background:#e8f5e9;color:#2e7d32;border-radius:6px;padding:2px 8px;font-weight:700">✓ ข้อมูลจริง</span>`
    : `<span style="font-size:10px;background:#e3f2fd;color:#1565c0;border-radius:6px;padding:2px 8px;font-weight:700">✦ AI Generated</span>`;

  const contentHtml = KEYS.map(({ key, label }) =>
    info[key] ? `<div class="info-section"><div class="info-label">${label}</div><div class="info-text" data-key="${key}">${info[key]}</div></div>` : ''
  ).join('');

  panel.innerHTML =
    `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      ${badge}
      <button class="translate-btn" onclick="translateInfo(this)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>
        แปล (ภาษาไทย)
      </button>
    </div>` + contentHtml;
}

async function translateInfo(btn) {
  const panel = btn.closest('.info-panel');
  if (panel.dataset.translated === '1') {
    // Toggle back to English
    panel.querySelectorAll('.info-text').forEach(el => {
      if (el.dataset.en) { el.textContent = el.dataset.en; }
    });
    panel.dataset.translated = '0';
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg> แปล (ภาษาไทย)`;
    return;
  }
  if (panel.dataset.translatedDone === '1') {
    // Already translated before — restore Thai
    panel.querySelectorAll('.info-text').forEach(el => {
      if (el.dataset.th) { el.textContent = el.dataset.th; }
    });
    panel.dataset.translated = '1';
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg> ดูภาษาอังกฤษ`;
    return;
  }
  btn.disabled = true;
  btn.innerHTML = `<div class="dot" style="display:inline-block"></div> กำลังแปล...`;

  const sections = {};
  panel.querySelectorAll('.info-text[data-key]').forEach(el => {
    el.dataset.en = el.textContent;
    sections[el.dataset.key] = el.textContent;
  });

  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4096,
        messages: [{
          role: 'user',
          content: `แปลข้อความต่อไปนี้เป็นภาษาไทยแบบเป็นธรรมชาติ สละสลวย สำหรับคนวงการโฆษณาไทย คงศัพท์เทคนิคโฆษณาไว้ในวงเล็บ\n\nตอบกลับเป็น JSON object เท่านั้น ไม่มี markdown ไม่มี backtick ไม่มีข้อความนำหน้าหรือต่อท้าย เริ่มต้นด้วย { และจบด้วย } เท่านั้น:\n${JSON.stringify(sections)}`
        }]
      })
    });
    const data = await res.json();
    const text = data.content[0].text.trim();
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('no json');
    const translated = JSON.parse(match[0]);

    panel.querySelectorAll('.info-text[data-key]').forEach(el => {
      const th = translated[el.dataset.key];
      if (th) { el.dataset.th = th; el.textContent = th; }
    });
    panel.dataset.translated = '1';
    panel.dataset.translatedDone = '1';
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg> ดูภาษาอังกฤษ`;
  } catch(e) {
    console.error('translateInfo error:', e);
    alert('เกิดข้อผิดพลาด: ' + e.message);
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg> แปล (ภาษาไทย)`;
  }
  btn.disabled = false;
}

}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
}

async function handleSend() {
  const input = document.getElementById('chatInput');
  const query = input.value.trim();
  if (!query) return;
  input.value = '';

  const area = document.getElementById('contentArea');

  const userBubble = document.createElement('div');
  userBubble.className = 'user-bubble';
  userBubble.textContent = query;

  const loader = document.createElement('div');
  loader.className = 'loader';
  loader.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div><span>AiDee กำลังคิด...</span>`;

  if (!area.querySelector('.messages')) {
    area.innerHTML = '<div class="messages"></div>';
  }
  const msgs = area.querySelector('.messages');
  msgs.appendChild(userBubble);
  msgs.appendChild(loader);
  area.scrollTop = area.scrollHeight;

  const systemPrompts = {
    check: buildCheckPrompt(currentSub),
    analyze: buildAnalyzePrompt(currentSub),
    awards: buildAwardsPrompt()
  };

  const systemPrompt = systemPrompts[currentTab] || systemPrompts.analyze;

  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        system: systemPrompt,
        messages: [{ role: 'user', content: query }]
      })
    });

    const data = await res.json();
    loader.remove();

    if (data.error) throw new Error(data.error.message);

    const answer = data.content[0].text;
    const aiEl = document.createElement('div');
    aiEl.className = 'ai-result';
    aiEl.innerHTML = `<div class="ai-result-head">🤖 AiDee</div>` + renderMarkdown(answer);
    msgs.appendChild(aiEl);
    area.scrollTop = area.scrollHeight;

  } catch (err) {
    loader.remove();
    const errEl = document.createElement('div');
    errEl.className = 'ai-result';
    errEl.innerHTML = `<p style="color:#c00">เกิดข้อผิดพลาด: ${err.message}</p>`;
    msgs.appendChild(errEl);
  }
}

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^## (.+)$/gm, '<h4>$1</h4>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hul]|<\/[hul])(.+)$/gm, s => s.startsWith('<') ? s : s)
    .split('\n').map(l => l.trim()).filter(l=>l).join('<br>');
}

function buildCheckPrompt(sub) {
  const awardsJson = JSON.stringify(AWARDS.map(a => ({
    comp:a.comp, year:a.year, brand:a.brand, campaign:a.campaign,
    category:a.category, level:a.level, insight:a.insight, idea:a.idea
  })));

  const modeDesc = {
    'By Keyword': 'ค้นหาตาม keyword ที่ตรงกับ campaign ที่เคยชนะรางวัล',
    'Insight / Background': 'ค้นหา insight หรือ background ที่คล้ายกัน',
    'Idea / Execution': 'ค้นหา idea หรือ execution ที่คล้ายกัน'

  return `คุณคือ AiDee ผู้เชี่ยวชาญด้านโฆษณาไทยและ ADFEST ที่ช่วยนักโฆษณาเช็คไอเดียซ้ำหรือใกล้เคียง

Mode: ${sub} — ${modeDesc[sub] || 'ค้นหาความคล้ายคลึง'}

ฐานข้อมูลผลงานรางวัล ADMAN และ ADFEST (10 ปีย้อนหลัง):
${awardsJson}

เมื่อผู้ใช้บรรยายไอเดียของตัวเอง:
1. วิเคราะห์ว่ามีผลงานในฐานข้อมูลที่ใกล้เคียงหรือไม่
2. ระบุชัดเจนว่าคล้ายกันในแง่ไหน (insight / idea / execution)
3. บอกระดับความคล้าย: สูง/กลาง/ต่ำ
4. แนะนำว่าควรปรับตรงไหนเพื่อสร้าง differentiation
ตอบเป็นภาษาไทย กระชับ ตรงประเด็น มีประโยชน์สำหรับ creative`;
}

function buildAnalyzePrompt(sub) {

  if (sub === 'AiDee Score') {

ฐานข้อมูล: ${awardsJson}

เมื่อผู้ใช้บรรยายไอเดีย ให้วิเคราะห์และให้คะแนน (1-10) ใน 4 มิติ:
1. **Insight Strength** — insight แข็งแกร่ง universal และ compelling แค่ไหน
2. **Idea Originality** — ไอเดียใหม่และแตกต่างจากที่เคยทำแค่ไหน
3. **Award Potential** — โอกาสชนะรางวัลในเวที ADMAN/ADFEST
4. **Execution Feasibility** — ทำได้จริงหรือไม่

จากนั้นให้:
- สรุป AiDee Score รวม (average)
- จุดแข็งที่ควรพัฒนาต่อ
- จุดอ่อนที่ต้องแก้ไข
- ตัวอย่างงานในฐานข้อมูลที่ใกล้เคียงเพื่อเปรียบเทียบ

ตอบเป็นภาษาไทย เป็น structured format`;
  }

  if (sub === 'Category Recommend') {
    return `คุณคือ AiDee ผู้เชี่ยวชาญด้านการส่งประกวด ADMAN และ ADFEST

ฐานข้อมูล: ${awardsJson}

Categories ของ ADMAN: Film, Digital, Integrated, Outdoor, Print, Radio, PR, Direct, Healthcare
Categories ของ ADFEST: Film Lotus, Print & Outdoor Lotus, Digital Lotus, Branded Entertainment Lotus, PR Lotus, Innova Lotus, Design Lotus

เมื่อผู้ใช้บรรยายไอเดีย:
1. แนะนำ Top 3 categories ที่เหมาะสมที่สุดสำหรับ ADMAN
2. แนะนำ Top 3 categories ที่เหมาะสมที่สุดสำหรับ ADFEST
3. อธิบายเหตุผลว่าทำไมแต่ละ category ถึงเหมาะ
4. ระบุ category ที่มี competition น้อยกว่าและโอกาสชนะสูงกว่า
5. อ้างอิงตัวอย่างงานที่ชนะในฐานข้อมูลเพื่อ benchmark

ตอบเป็นภาษาไทย`;
  }

  return `คุณคือ AiDee นักวิเคราะห์โฆษณาผู้เชี่ยวชาญ ADMAN และ ADFEST

ฐานข้อมูล: ${awardsJson}

เมื่อผู้ใช้บรรยายไอเดีย ทำ Case Analysis แบบละเอียด:
1. **Problem / Insight** — insight ที่ไอเดียนี้ตอบสนองคืออะไร ทรงพลังแค่ไหน
2. **Big Idea** — big idea คืออะไร มัน work หรือไม่ และทำไม
3. **Execution Assessment** — execution ที่เสนอมาเหมาะสมกับ idea ไหม
4. **Award Strategy** — ควรเล่นเรื่องอะไร เพื่อชนะ judge ใน ADMAN/ADFEST
5. **Risk Assessment** — ความเสี่ยงที่ judge อาจตัดคะแนน
6. **Similar Case Studies** — งานในฐานข้อมูลที่ใกล้เคียงและบทเรียนจากมัน
7. **Recommendation** — สิ่งที่ควรทำให้ดียิ่งขึ้น

ตอบเป็นภาษาไทย เชิงวิชาการแต่เข้าใจง่าย`;
}

function buildAwardsPrompt() {
  const awardsJson = JSON.stringify(AWARDS);
  return `คุณคือ AiDee ผู้เชี่ยวชาญด้านผลงานรางวัล ADMAN และ ADFEST

ฐานข้อมูล: ${awardsJson}

ตอบคำถามเกี่ยวกับผลงานรางวัลในฐานข้อมูลนี้ วิเคราะห์ trend pattern และ insight จากผลงานที่ชนะรางวัล ตอบเป็นภาษาไทย`;
}
